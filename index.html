<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabula rasa | contrepoint acoustique</title>
    <meta
      name="description"
      content="Tabula Rasa par Contrepoint acoustique. Présentation modulaire recentrée sur la navbar et les lignes image + texte."
    >
    <link rel="icon" type="image/jpeg" href="Ressource/images/logo.jpg">
    <link rel="stylesheet" href="styles.css?v=20260330o">
    <script type="module" src="app.js?v=20260330o"></script>
  </head>
  <body id="top">
    <header class="navbar">
      <div class="navbar__inner">
        <nav class="navbar__nav" id="navbar-nav" aria-label="Navbar"></nav>

        <div class="navbar__controls">
          <button
            class="navbar__debug-flag"
            id="debug-flag"
            type="button"
            hidden
            aria-expanded="false"
            aria-controls="debug-panel"
          >
            DEBUG
          </button>

          <div class="navbar__control">
            <label class="navbar__label" for="language-select" id="language-label">Langue</label>
            <select id="language-select" aria-labelledby="language-label">
              <option value="fr">FR</option>
              <option value="en">EN</option>
              <option value="es">ES</option>
            </select>
          </div>

          <div class="navbar__control" id="debug-controls" hidden>
            <label class="navbar__label" for="mode-select" id="mode-label">Mode texte</label>
            <select id="mode-select" aria-labelledby="mode-label">
              <option value="corrected">Corrigé</option>
              <option value="marketing">Marketing</option>
              <option value="raw">Brut</option>
            </select>
          </div>
        </div>
      </div>

      <div class="navbar__debug-panel" id="debug-panel" hidden>
        <p class="navbar__debug-panel-title" id="debug-panel-title">Typo debug</p>

        <label class="navbar__debug-option">
          <input id="debug-title-font-toggle" type="checkbox">
          <span id="debug-title-font-label">Special Font</span>
        </label>

        <div class="navbar__debug-option navbar__debug-option--stack">
          <label
            class="navbar__label navbar__label--panel"
            for="debug-title-case-select"
            id="debug-title-case-label"
          >
            Format des titres
          </label>
          <select id="debug-title-case-select" aria-labelledby="debug-title-case-label">
            <option value="current">Actuel</option>
            <option value="uppercase">FULL MAJ</option>
            <option value="sentence">Première lettre</option>
            <option value="lowercase">minuscules</option>
          </select>
        </div>

        <label class="navbar__debug-option">
          <input id="debug-body-font-toggle" type="checkbox">
          <span id="debug-body-font-label">Texte normal en Special Font</span>
        </label>
      </div>

      <p class="navbar__message" id="debug-message" aria-live="polite" hidden></p>
    </header>

    <main class="site-main">
      <section
        id="line-01"
        class="site-row site-row--line-01 reveal"
        data-row="line-01-brand-intro"
      >
        <div class="site-row__media" data-row-media></div>
        <div class="site-row__content" data-row-text></div>
      </section>

      <section
        id="line-02"
        class="site-row site-row--line-02 reveal"
        data-row="line-02-speaker-hero"
      >
        <div class="site-row__content" data-row-text></div>
        <div class="site-row__media" data-row-media></div>
      </section>

      <section
        id="line-03"
        class="site-row site-row--line-03 reveal"
        data-row="line-03-speaker-design"
      >
        <div class="site-row__media" data-row-media></div>
        <div class="site-row__content" data-row-text></div>
      </section>

      <section
        id="line-04"
        class="site-row site-row--line-04 reveal"
        data-row="line-04-speaker-detail"
      >
        <div class="site-row__content" data-row-text></div>
        <div class="site-row__media" data-row-media></div>
      </section>

      <section
        id="line-05"
        class="site-row site-row--line-05 reveal"
        data-row="line-05-speaker-closeup-left"
      >
        <div class="site-row__media" data-row-media></div>
        <div class="site-row__content" data-row-text></div>
      </section>

      <section
        id="line-06"
        class="site-row site-row--line-06 reveal"
        data-row="line-06-speaker-closeup-right-contact"
      >
        <div class="site-row__content" data-row-text></div>
        <div class="site-row__media" data-row-media></div>
      </section>
    </main>
  </body>
</html>
